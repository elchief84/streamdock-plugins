<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Git Workspace Manager - Settings</title>
</head>
<body>
    <div class="sdpi-wrapper p-3" id="main" style="display:none">
        <div class="mb-3">
            <label class="form-label">Repository Path</label>
            <input type="text" class="form-control" id="repoPath" placeholder="/path/to/your/repo" />
        </div>

        <div class="mb-3">
            <label class="form-label">Friendly Name</label>
            <input type="text" class="form-control" id="friendlyName" placeholder="My Project (optional)" />
        </div>

        <div class="mb-3">
            <label class="form-label">Refresh Interval (seconds)</label>
            <input type="number" class="form-control" id="refreshInterval" placeholder="60" min="5" max="3600" />
        </div>

        <div class="mb-3">
            <label class="form-label">Pull Strategy</label>
            <select class="form-select" id="pullStrategy">
                <option value="merge">Merge (git pull)</option>
                <option value="rebase">Rebase (git pull --rebase)</option>
            </select>
        </div>

        <div class="mb-3">
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="autoFetch" checked />
                <label class="form-check-label" for="autoFetch">Auto Fetch</label>
            </div>
        </div>

        <div class="mb-3">
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="autoReturn" checked />
                <label class="form-check-label" for="autoReturn">Auto Return After Action</label>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Target Profile (page name to open on press)</label>
            <input type="text" class="form-control" id="targetProfile" placeholder="e.g. Git Actions (leave empty to disable)" />
        </div>

        <div class="mb-3">
            <button type="button" class="btn btn-primary" id="saveBtn">Save</button>
        </div>

        <div id="statusMsg" class="mt-2" style="display:none"></div>
    </div>

    <script src="utils/common.js"></script>
    <script src="utils/action.js"></script>
    <script src="index.js"></script>
</body>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        padding: 8px;
        background-color: #2a2a2a;
        color: #e0e0e0;
        font-size: 13px;
    }

    ::-webkit-scrollbar {
        display: none;
    }

    .form-label {
        display: block;
        margin-bottom: 4px;
        color: #aaa;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
    }

    .form-control, .form-select {
        width: 100%;
        padding: 6px 10px;
        background: #3a3a3a;
        border: 1px solid #555;
        border-radius: 4px;
        color: #e0e0e0;
        font-size: 13px;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }

    .form-control:focus, .form-select:focus {
        outline: none;
        border-color: #4a90d9;
    }

    .form-check {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
    }

    .form-check-input {
        width: 16px;
        height: 16px;
        accent-color: #4a90d9;
    }

    .form-check-label {
        color: #ccc;
        font-size: 13px;
    }

    .mb-3 {
        margin-bottom: 12px;
    }

    .btn {
        width: 100%;
        padding: 8px 16px;
        background: #4a90d9;
        border: none;
        border-radius: 4px;
        color: white;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }

    .btn:hover {
        background: #3a7bc8;
    }

    #statusMsg {
        padding: 6px 10px;
        border-radius: 4px;
        font-size: 12px;
    }

    #statusMsg.success {
        background: #1b4332;
        color: #95d5b2;
    }

    #statusMsg.error {
        background: #5c1a1a;
        color: #f5a5a5;
    }
</style>
</html>
